<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>博士ランナー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1d24;
      font-family: system-ui, "Segoe UI", sans-serif;
      touch-action: none;
    }
    #wrap {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #hint {
      color: #8b92a5;
      font-size: 12px;
      padding: 6px 8px;
      text-align: center;
      max-width: 960px;
    }
    #bgmToggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 2;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font: 700 13px system-ui, "Segoe UI", sans-serif;
      padding: 8px 10px;
      cursor: pointer;
    }
    #bgmToggle:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <button id="bgmToggle" type="button" aria-pressed="true">BGM ON</button>
    <audio id="bgm" preload="auto" loop>
      <source src="assets/sounds/Hakase-Runner-Loop.ogg" type="audio/ogg">
      <source src="assets/sounds/Hakase-Runner-Loop.mp3" type="audio/mpeg">
    </audio>
    <canvas id="game" width="960" height="540" tabindex="0" aria-label="博士ランナー ゲーム画面"></canvas>
    <p id="hint">PC: Space/W ジャンプ · ↓/S スライド · Enter スタート/リトライ　スマホ: タップ=ジャンプ · 下スワイプ=スライド</p>
  </div>
  <script>
(function () {
  "use strict";

  const canvas = document.getElementById("game");
  const wrap = document.getElementById("wrap");
  const bgm = document.getElementById("bgm");
  const bgmToggle = document.getElementById("bgmToggle");
  const ctx = canvas.getContext("2d");

  const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };
  let state = STATE.TITLE;

  let cameraX = 0;
  let gameTime = 0;
  let score = 0;
  let lastFrame = 0;
  let gameOverSelectIndex = 0;

  const PLAYER_SCREEN_X = 200;
  const GROUND_MARGIN = 100;
  let groundY = 440;

  const GRAVITY = 2400;
  /** 上向きを正とする初速 */
  const JUMP_V = 780;
  const MAX_JUMPS = 2;
  const SLIDE_DURATION = 0.45;
  const SLIDE_COOLDOWN = 0.1;

  let player = {
    vy: 0,
    alt: 0,
    onGround: true,
    jumpsLeft: MAX_JUMPS,
    sliding: false,
    slideT: 0,
    slideCD: 0,
    facing: 1,
  };

  let pits = [];
  let coins = [];
  let enemies = [];
  let obstacles = [];

  let worldEndX = 0;

  const keys = new Set();

  let touchStartY = 0;
  let touchStartX = 0;
  let touchActive = false;
  let bgmEnabled = true;
  let audioCtx = null;
  let gameOverJingleNodes = [];

  bgm.volume = 0.45;

  function getAudioContext() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return null;
    if (!audioCtx) audioCtx = new AudioContextClass();
    return audioCtx;
  }

  function unlockAudio() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state !== "suspended") return;
    const resumePromise = ctx.resume();
    if (resumePromise && typeof resumePromise.catch === "function") {
      resumePromise.catch(function () {});
    }
  }

  function playJumpSfx() {
    const ctx = getAudioContext();
    if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "triangle";
    osc.frequency.setValueAtTime(620, now);
    osc.frequency.exponentialRampToValueAtTime(980, now + 0.09);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.07, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.14);
  }

  function playCoinSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;
    const notes = [
      { t: 0, f: 880 },
      { t: 0.055, f: 1320 },
    ];

    for (let i = 0; i < notes.length; i++) {
      const note = notes[i];
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t0 = now + note.t;
      const t1 = t0 + 0.11;

      osc.type = "square";
      osc.frequency.setValueAtTime(note.f, t0);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.linearRampToValueAtTime(0.045, t0 + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, t1);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t1 + 0.01);
      osc.addEventListener("ended", function () {
        try {
          osc.disconnect();
          gain.disconnect();
        } catch (err) {}
      });
    }
  }

  function playGameOverSfx() {
    const ctx = getAudioContext();
    if (!ctx) return;
    const play = function () {
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "square";
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.setValueAtTime(330, now + 0.12);
      osc.frequency.setValueAtTime(220, now + 0.24);
      osc.frequency.exponentialRampToValueAtTime(110, now + 0.46);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(0.09, now + 0.02);
      gain.gain.setValueAtTime(0.08, now + 0.28);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.52);
    };

    if (ctx.state === "suspended") {
      const resumePromise = ctx.resume();
      if (resumePromise && typeof resumePromise.then === "function") {
        resumePromise.then(play).catch(function () {});
      }
    } else {
      play();
    }
  }

  function stopGameOverJingle() {
    for (let i = 0; i < gameOverJingleNodes.length; i++) {
      try {
        gameOverJingleNodes[i].stop();
      } catch (err) {
        /* The node may have already finished. */
      }
      try {
        gameOverJingleNodes[i].disconnect();
      } catch (err) {
        /* Disconnect is best-effort cleanup for finished nodes. */
      }
    }
    gameOverJingleNodes = [];
  }

  function playGameOverJingle() {
    const ctx = getAudioContext();
    if (!ctx) return;
    stopGameOverJingle();

    const play = function () {
      const start = ctx.currentTime + 0.58;
      const notes = [
        { t: 0.00, f: 392, d: 0.16 },
        { t: 0.18, f: 349, d: 0.16 },
        { t: 0.36, f: 294, d: 0.2 },
        { t: 0.62, f: 247, d: 0.42 },
      ];

      for (let i = 0; i < notes.length; i++) {
        const note = notes[i];
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const t0 = start + note.t;
        const t1 = t0 + note.d;

        osc.type = "triangle";
        osc.frequency.setValueAtTime(note.f, t0);
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.linearRampToValueAtTime(0.07, t0 + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, t1);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t0);
        osc.stop(t1 + 0.02);
        osc.addEventListener("ended", function () {
          try {
            osc.disconnect();
            gain.disconnect();
          } catch (err) {}
        });
        gameOverJingleNodes.push(osc);
      }
    };

    if (ctx.state === "suspended") {
      const resumePromise = ctx.resume();
      if (resumePromise && typeof resumePromise.then === "function") {
        resumePromise.then(play).catch(function () {});
      }
    } else {
      play();
    }
  }

  function updateBgmButton() {
    bgmToggle.textContent = bgmEnabled ? "BGM ON" : "BGM OFF";
    bgmToggle.setAttribute("aria-pressed", bgmEnabled ? "true" : "false");
  }

  function playBgm(restart) {
    if (!bgmEnabled || state !== STATE.PLAYING) return;
    if (restart) {
      try {
        bgm.currentTime = 0;
      } catch (err) {
        /* Some browsers may block seeking before metadata is ready. */
      }
    }
    const playPromise = bgm.play();
    if (playPromise && typeof playPromise.catch === "function") {
      playPromise.catch(function () {
        /* Autoplay restrictions are expected until a user gesture starts the game. */
      });
    }
  }

  function pauseBgm() {
    bgm.pause();
  }

  function setGameOver() {
    if (state === STATE.GAMEOVER) return;
    state = STATE.GAMEOVER;
    gameOverSelectIndex = 0;
    pauseBgm();
    playGameOverSfx();
    playGameOverJingle();
  }

  function goToTitle() {
    stopGameOverJingle();
    state = STATE.TITLE;
    try {
      canvas.focus({ preventScroll: true });
    } catch (err) {
      canvas.focus();
    }
  }

  function toggleBgm() {
    bgmEnabled = !bgmEnabled;
    updateBgmButton();
    if (bgmEnabled) {
      playBgm(false);
    } else {
      pauseBgm();
    }
  }

  updateBgmButton();

  function resize() {
    const maxW = window.innerWidth;
    const maxH = window.innerHeight - 40;
    const r = Math.min(maxW / 960, maxH / 540, 1);
    canvas.style.width = Math.floor(960 * r) + "px";
    canvas.style.height = Math.floor(540 * r) + "px";
    groundY = 540 - GROUND_MARGIN;
  }
  window.addEventListener("resize", resize);
  resize();

  function scrollSpeed() {
    return 220 + Math.min(180, gameTime * 8);
  }

  function spawnDifficulty() {
    return Math.min(1, gameTime / 120);
  }

  function resetGame() {
    unlockAudio();
    stopGameOverJingle();
    cameraX = 0;
    gameTime = 0;
    score = 0;
    player.vy = 0;
    player.alt = 0;
    player.onGround = true;
    player.jumpsLeft = MAX_JUMPS;
    player.sliding = false;
    player.slideT = 0;
    player.slideCD = 0;
    pits = [];
    coins = [];
    enemies = [];
    obstacles = [];
    worldEndX = 1200;
    state = STATE.PLAYING;
    lastFrame = performance.now();
    ensureWorld(2500);
    playBgm(true);
  }

  function isOverPit(feetWorldX, hitWidth) {
    const left = feetWorldX - hitWidth / 2;
    const right = feetWorldX + hitWidth / 2;
    for (let i = 0; i < pits.length; i++) {
      const p = pits[i];
      if (right > p.left + 2 && left < p.right - 2) return true;
    }
    return false;
  }

  function playerHitSize() {
    const w = 34;
    const h = player.sliding ? 28 : 72;
    return { w, h };
  }

  function playerFeetWorldX() {
    return cameraX + PLAYER_SCREEN_X;
  }

  function playerAABB() {
    const feetX = playerFeetWorldX();
    const { w, h } = playerHitSize();
    const bottom = groundY - player.alt;
    const top = bottom - h;
    return { left: feetX - w / 2, right: feetX + w / 2, top, bottom };
  }

  function aabbOverlap(a, b) {
    return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
  }

  function ensureWorld(minX) {
    while (worldEndX < minX) {
      const chunkStart = worldEndX;
      const chunkW = 480 + Math.random() * 260;
      const chunkEnd = chunkStart + chunkW;
      const d = spawnDifficulty();
      let pit = null;

      if (Math.random() < 0.28 + d * 0.22) {
        const pitW = 60 + Math.random() * (70 + d * 50);
        const margin = 180;
        const pitLeft = chunkStart + margin + Math.random() * Math.max(40, chunkW - pitW - margin * 2);
        const pitRight = pitLeft + pitW;
        pit = { left: pitLeft, right: pitRight };
        pits.push(pit);
      }

      const spawnCount = 1 + (Math.random() < d * 0.25 ? 1 : 0);
      const hazardXs = [];
      for (let s = 0; s < spawnCount; s++) {
        let ex = chunkStart + 120 + Math.random() * (chunkW - 240);
        let tries = 0;
        while (
          tries < 8 &&
          ((pit && ex > pit.left - 150 && ex < pit.right + 150) ||
            hazardXs.some(function (x) { return Math.abs(x - ex) < 190; }))
        ) {
          ex = chunkStart + 120 + Math.random() * (chunkW - 240);
          tries++;
        }
        if ((pit && ex > pit.left - 130 && ex < pit.right + 130) ||
            hazardXs.some(function (x) { return Math.abs(x - ex) < 170; })) {
          continue;
        }
        hazardXs.push(ex);
        const roll = Math.random();
        if (roll < 0.28) {
          enemies.push({
            kind: "walker",
            x: ex,
            w: 40,
            h: 44,
            vx: -40 - Math.random() * 30 - d * 20,
          });
        } else if (roll < 0.52) {
          enemies.push({
            kind: "floater",
            x: ex,
            y: groundY - (110 + Math.random() * 70),
            w: 46,
            h: 36,
            phase: Math.random() * Math.PI * 2,
            amp: 18 + Math.random() * 12,
          });
        } else if (roll < 0.72) {
          enemies.push({
            kind: "bouncer",
            x: ex,
            baseY: groundY,
            w: 38,
            h: 38,
            vy: 520 + Math.random() * 220 + d * 120,
            gravity: GRAVITY * 1.05,
          });
        } else if (roll < 0.88) {
          obstacles.push({
            x: ex - 22,
            w: 44,
            h: 52,
          });
        } else {
          coins.push({ x: ex, y: groundY - 28 - Math.random() * 90, r: 14, taken: false });
        }
      }

      if (Math.random() < 0.55 + d * 0.2) {
        const cx = chunkStart + 60 + Math.random() * (chunkW - 120);
        coins.push({ x: cx, y: groundY - 32 - Math.random() * 50, r: 14, taken: false });
      }

      worldEndX = chunkEnd;
    }
  }

  function cullOffscreen() {
    const cut = cameraX - 400;
    pits = pits.filter(function (p) { return p.right > cut; });
    coins = coins.filter(function (c) { return c.x > cut; });
    enemies = enemies.filter(function (e) { return e.x > cut; });
    obstacles = obstacles.filter(function (o) { return o.x + o.w > cut; });
  }

  function tryJump() {
    if (state !== STATE.PLAYING) return;
    if (player.jumpsLeft > 0 && !player.sliding) {
      unlockAudio();
      player.vy = JUMP_V;
      player.onGround = false;
      player.jumpsLeft--;
      playJumpSfx();
    }
  }

  function trySlide() {
    if (state !== STATE.PLAYING) return;
    if (player.slideCD > 0) return;
    if (player.onGround) {
      player.sliding = true;
      player.slideT = SLIDE_DURATION;
    }
  }

  function isEnterKey(e) {
    return e.key === "Enter" || e.code === "Enter" || e.code === "NumpadEnter";
  }

  document.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.key === " ") e.preventDefault();
    unlockAudio();
    keys.add(e.code);
    
    if (state === STATE.GAMEOVER) {
      if ((e.code === "ArrowUp" || e.code === "KeyW") && !e.repeat) {
        gameOverSelectIndex = 0;
      }
      if ((e.code === "ArrowDown" || e.code === "KeyS") && !e.repeat) {
        gameOverSelectIndex = 1;
      }
    } else {
      if ((e.code === "Space" || e.code === "KeyW") && !e.repeat) tryJump();
      if ((e.code === "ArrowDown" || e.code === "KeyS") && !e.repeat) trySlide();
    }
    
    if (e.code === "KeyM" && !e.repeat) toggleBgm();
    
    if (isEnterKey(e) && !e.repeat) {
      if (state === STATE.TITLE) {
        e.preventDefault();
        resetGame();
      } else if (state === STATE.GAMEOVER) {
        e.preventDefault();
        if (gameOverSelectIndex === 0) {
          resetGame();
        } else {
          goToTitle();
        }
      }
    }
  }, { passive: false });

  document.addEventListener("keyup", function (e) {
    keys.delete(e.code);
  });

  bgmToggle.addEventListener("pointerdown", function (e) {
    e.stopPropagation();
  });

  bgmToggle.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    unlockAudio();
    toggleBgm();
  });

  wrap.addEventListener("pointerdown", function (e) {
    unlockAudio();
    if (state === STATE.TITLE) {
      e.preventDefault();
      touchActive = true;
      touchStartY = e.clientY;
      touchStartX = e.clientX;
      resetGame();
      try {
        canvas.focus({ preventScroll: true });
      } catch (err) {
        canvas.focus();
      }
      return;
    }
  }, { passive: false });

  canvas.addEventListener("pointerdown", function (e) {
    unlockAudio();
    if (state === STATE.PLAYING) {
      e.preventDefault();
      touchActive = true;
      touchStartY = e.clientY;
      touchStartX = e.clientX;
      tryJump();
    } else if (state === STATE.GAMEOVER) {
      e.preventDefault();
      e.stopPropagation();
      const rect = canvas.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 960;
      const y = ((e.clientY - rect.top) / rect.height) * 540;
      
      if (x >= 430 && x <= 730 && y >= 295 && y <= 330) {
        try { canvas.focus({ preventScroll: true }); } catch (err) { canvas.focus(); }
        resetGame();
      } else if (x >= 430 && x <= 730 && y >= 330 && y <= 365) {
        try { canvas.focus({ preventScroll: true }); } catch (err) { canvas.focus(); }
        goToTitle();
      }
    }
  }, { passive: false });

  canvas.addEventListener("pointermove", function (e) {
    if (state !== STATE.GAMEOVER) return;
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 960;
    const y = ((e.clientY - rect.top) / rect.height) * 540;
    if (x >= 430 && x <= 730) {
      if (y >= 295 && y <= 330) {
        gameOverSelectIndex = 0;
      } else if (y >= 330 && y <= 365) {
        gameOverSelectIndex = 1;
      }
    }
  });

  document.addEventListener("pointerup", function (e) {
    if (!touchActive) return;
    touchActive = false;
    const dy = e.clientY - touchStartY;
    const dx = e.clientX - touchStartX;
    if (dy > 55 && Math.abs(dy) > Math.abs(dx) * 0.6) trySlide();
  }, { passive: false });

  document.addEventListener("pointercancel", function () {
    touchActive = false;
  });

  function update(dt) {
    if (state !== STATE.PLAYING) return;

    gameTime += dt;
    const spd = scrollSpeed();
    cameraX += spd * dt;

    score += dt * 12;
    ensureWorld(cameraX + 1400);

    if (player.slideCD > 0) player.slideCD -= dt;
    if (player.sliding) {
      player.slideT -= dt;
      if (player.slideT <= 0) {
        player.sliding = false;
        player.slideCD = SLIDE_COOLDOWN;
      }
    }

    const feetX = playerFeetWorldX();
    const hitSize = playerHitSize();
    const overPit = isOverPit(feetX, hitSize.w);

    player.vy -= GRAVITY * dt;
    player.alt += player.vy * dt;

    if (!overPit) {
      if (player.alt < 0) {
        player.alt = 0;
        if (player.vy < 0) player.vy = 0;
      }
      player.onGround = player.alt <= 0.5 && player.vy <= 0.5;
      if (player.onGround) player.jumpsLeft = MAX_JUMPS;
    } else {
      player.onGround = false;
      if (player.alt < -80) {
        setGameOver();
        return;
      }
    }

    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (e.kind === "walker") {
        e.x += (e.vx - spd) * dt;
      } else if (e.kind === "floater") {
        e.x -= spd * dt;
        e.phase += dt * 3;
        e._y = e.y + Math.sin(e.phase) * e.amp;
      } else if (e.kind === "bouncer") {
        e.x -= spd * dt;
        e.vy -= e.gravity * dt;
        e.baseY -= e.vy * dt;
        if (e.baseY > groundY) {
          e.baseY = groundY;
          e.vy = 520 + Math.random() * 220 + spawnDifficulty() * 140;
        }
      }
    }

    for (let i = 0; i < obstacles.length; i++) {
      obstacles[i].x -= spd * dt;
    }

    for (let i = 0; i < coins.length; i++) {
      const c = coins[i];
      if (c.taken) continue;
      c.x -= spd * dt;
    }

    for (let i = 0; i < pits.length; i++) {
      /* pits static in world */
    }

    const ph = playerAABB();

    for (let i = 0; i < coins.length; i++) {
      const c = coins[i];
      if (c.taken) continue;
      const cr = {
        left: c.x - c.r,
        right: c.x + c.r,
        top: c.y - c.r,
        bottom: c.y + c.r,
      };
      if (aabbOverlap(ph, cr)) {
        c.taken = true;
        score += 50;
        playCoinSfx();
      }
    }

    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      let eb;
      if (e.kind === "walker") {
        eb = { left: e.x - e.w / 2, right: e.x + e.w / 2, top: groundY - e.h, bottom: groundY };
      } else if (e.kind === "floater") {
        const yy = e._y !== undefined ? e._y : e.y;
        eb = { left: e.x - e.w / 2, right: e.x + e.w / 2, top: yy - e.h, bottom: yy };
      } else {
        eb = { left: e.x - e.w / 2, right: e.x + e.w / 2, top: e.baseY - e.h, bottom: e.baseY };
      }
      if (aabbOverlap(ph, eb)) {
        setGameOver();
        return;
      }
    }

    for (let i = 0; i < obstacles.length; i++) {
      const o = obstacles[i];
      const ob = { left: o.x, right: o.x + o.w, top: groundY - o.h, bottom: groundY };
      if (aabbOverlap(ph, ob)) {
        setGameOver();
        return;
      }
    }

    cullOffscreen();
  }

  function drawParallax() {
    const w = canvas.width;
    const h = canvas.height;
    const sky0 = ctx.createLinearGradient(0, 0, 0, h);
    sky0.addColorStop(0, "#6eb8ff");
    sky0.addColorStop(0.55, "#9addff");
    sky0.addColorStop(1, "#d5f6ff");
    ctx.fillStyle = sky0;
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = "rgba(255,255,255,0.22)";
    for (let y = 32; y < groundY - 150; y += 36) {
      const dashOff = (Math.floor(cameraX * 0.02) + y) % 64;
      for (let x = -dashOff; x < w; x += 64) {
        ctx.fillRect(x, y, 18, 2);
      }
    }

    ctx.fillStyle = "#fff2a8";
    ctx.beginPath();
    ctx.arc(w - 118, 82, 34, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.fillRect(w - 150, 80, 64, 4);
    ctx.fillRect(w - 140, 96, 42, 4);

    const cloudOff = (cameraX * 0.07) % 260;
    for (let i = -1; i < 5; i++) {
      const cx = i * 260 - cloudOff;
      const cy = 62 + (i % 3) * 30;
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.fillRect(cx, cy + 18, 96, 18);
      ctx.fillRect(cx + 18, cy + 6, 34, 18);
      ctx.fillRect(cx + 46, cy, 38, 24);
      ctx.fillRect(cx + 76, cy + 10, 38, 20);
      ctx.fillStyle = "rgba(116,164,210,0.28)";
      ctx.fillRect(cx + 8, cy + 34, 88, 4);
    }

    const mountainOff = (cameraX * 0.12) % 360;
    for (let i = -1; i < 5; i++) {
      const mx = i * 360 - mountainOff;
      ctx.fillStyle = "#7fa6bf";
      ctx.beginPath();
      ctx.moveTo(mx - 60, groundY);
      ctx.lineTo(mx + 115, groundY - 188);
      ctx.lineTo(mx + 290, groundY);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#a7c7d6";
      ctx.beginPath();
      ctx.moveTo(mx + 115, groundY - 188);
      ctx.lineTo(mx + 155, groundY - 76);
      ctx.lineTo(mx + 82, groundY - 102);
      ctx.closePath();
      ctx.fill();
    }

    const hillFarOff = (cameraX * 0.22) % 420;
    ctx.fillStyle = "#73ad78";
    for (let i = -1; i < 4; i++) {
      const hx = i * 420 - hillFarOff;
      ctx.beginPath();
      ctx.moveTo(hx, groundY);
      ctx.quadraticCurveTo(hx + 210, groundY - 115, hx + 420, groundY);
      ctx.lineTo(hx + 420, groundY);
      ctx.lineTo(hx, groundY);
      ctx.fill();
    }

    const hillNearOff = (cameraX * 0.36) % 300;
    ctx.fillStyle = "#4f8b63";
    for (let i = -1; i < 5; i++) {
      const hx = i * 300 - hillNearOff;
      ctx.beginPath();
      ctx.moveTo(hx, groundY);
      ctx.quadraticCurveTo(hx + 150, groundY - 72, hx + 300, groundY);
      ctx.lineTo(hx + 300, groundY);
      ctx.lineTo(hx, groundY);
      ctx.fill();
    }

    const forestOff = (cameraX * 0.5) % 96;
    for (let x = -96 - forestOff; x < w + 96; x += 48) {
      const treeH = 42 + ((x / 48) & 1) * 14;
      ctx.fillStyle = "#2f6f52";
      ctx.fillRect(x + 20, groundY - treeH + 18, 8, treeH - 18);
      ctx.beginPath();
      ctx.moveTo(x + 24, groundY - treeH);
      ctx.lineTo(x + 4, groundY - 14);
      ctx.lineTo(x + 44, groundY - 14);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      ctx.fillRect(x + 18, groundY - treeH + 18, 12, 4);
    }
  }

  function drawGround() {
    const w = canvas.width;
    const h = canvas.height;
    const gy = groundY;

    const dirt = ctx.createLinearGradient(0, gy, 0, h);
    dirt.addColorStop(0, "#b8844c");
    dirt.addColorStop(1, "#7a4e32");
    ctx.fillStyle = dirt;
    ctx.fillRect(0, gy, w, h - gy);

    ctx.fillStyle = "#68a848";
    ctx.fillRect(0, gy - 10, w, 10);
    ctx.fillStyle = "#9bd15f";
    ctx.fillRect(0, gy - 14, w, 5);
    ctx.fillStyle = "#3f7b3f";
    for (let gx = -((cameraX * 1.1) % 24); gx < w; gx += 24) {
      ctx.fillRect(gx, gy - 14, 12, 4);
      ctx.fillRect(gx + 8, gy - 6, 16, 3);
    }

    const tile = 32;
    const tileOff = ((cameraX % tile) + tile) % tile;
    ctx.strokeStyle = "rgba(83,52,34,0.45)";
    ctx.lineWidth = 2;
    for (let gx = -tileOff; gx < w; gx += tile) {
      ctx.beginPath();
      ctx.moveTo(gx, gy + 6);
      ctx.lineTo(gx, h);
      ctx.stroke();
    }
    for (let yy = gy + 22; yy < h; yy += tile) {
      ctx.beginPath();
      ctx.moveTo(0, yy);
      ctx.lineTo(w, yy);
      ctx.stroke();
    }

    for (let gx = -tileOff; gx < w + tile; gx += tile) {
      const rowShift = Math.floor((gx + tileOff) / tile) % 2;
      ctx.fillStyle = rowShift ? "rgba(246,190,98,0.28)" : "rgba(92,55,33,0.2)";
      ctx.fillRect(gx + 7, gy + 17, 10, 5);
      ctx.fillRect(gx + 21, gy + 50, 7, 4);
    }

    ctx.fillStyle = "#5a4a3a";
    for (let i = 0; i < pits.length; i++) {
      const p = pits[i];
      const l = p.left - cameraX;
      const r = p.right - cameraX;
      if (r < 0 || l > w) continue;
      const pitL = Math.max(0, l);
      const pitR = Math.min(w, r);
      const pitW = pitR - pitL;
      ctx.fillStyle = "#3d3028";
      ctx.fillRect(pitL, gy - 8, pitW, h - gy + 8);
      ctx.fillStyle = "#2a2520";
      ctx.fillRect(pitL + 4, gy + 8, Math.max(0, pitW - 8), h - gy - 8);
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(pitL, gy - 8, pitW, 8);
    }
  }

  function drawWorld() {
    for (let i = 0; i < obstacles.length; i++) {
      const o = obstacles[i];
      const sx = o.x - cameraX;
      ctx.fillStyle = "#7a5c3e";
      ctx.fillRect(sx, groundY - o.h, o.w, o.h);
      ctx.strokeStyle = "#4a3625";
      ctx.strokeRect(sx, groundY - o.h, o.w, o.h);
    }

    for (let i = 0; i < coins.length; i++) {
      const c = coins[i];
      if (c.taken) continue;
      const sx = c.x - cameraX;
      ctx.fillStyle = "#ffd54a";
      ctx.beginPath();
      ctx.arc(sx, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#c49000";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    for (let i = 0; i < enemies.length; i++) drawEnemy(enemies[i]);
  }

      ctx.fillRect(cx - 108, cy - 40, 216, 48);
      ctx.fillStyle = "#f0c052";
      ctx.fillRect(cx - 102, cy - 34, 204, 4);
      ctx.fillRect(cx - 102, cy + 0, 204, 4);
      ctx.fillStyle = "#f7f7ff";
      ctx.font = "bold 22px system-ui,sans-serif";
      ctx.fillText("最終スコア " + Math.floor(score), cx, cy - 10);

      ctx.save();
      ctx.translate(cx - 178, cy + 74);
      ctx.rotate(-0.12);
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.fillRect(-30, -5, 68, 6);
      ctx.fillStyle = "#0a0a0a";
      ctx.fillRect(-22, -13, 48, 10);
      ctx.fillStyle = "#f4efe4";
      ctx.fillRect(-26, -30, 42, 18);
      ctx.fillRect(-4, -34, 25, 10);
      ctx.fillStyle = "#2a2520";
      ctx.fillRect(-8, -28, 12, 16);
      ctx.fillStyle = "#f0d6ba";
      ctx.fillRect(-18, -46, 25, 18);
      ctx.fillRect(3, -39, 10, 7);
      ctx.fillStyle = "#d9d5cc";
      ctx.fillRect(-23, -51, 34, 8);
      ctx.fillRect(-9, -58, 14, 14);
      ctx.fillRect(4, -53, 11, 11);
      ctx.fillStyle = "#050505";
      ctx.fillRect(-15, -41, 13, 6);
      ctx.fillRect(-2, -39, 13, 4);
      ctx.fillStyle = "#f7f2e8";
      ctx.fillRect(1, -32, 11, 3);
      ctx.fillStyle = "#ffdf5b";
      ctx.fillRect(22, -58, 4, 4);
      ctx.fillRect(31, -48, 4, 4);
      ctx.restore();

      // 選択肢の表示
      ctx.textAlign = "left";
      ctx.font = "bold 20px system-ui,sans-serif";
      
      const opt1Y = cy + 48;
      const opt2Y = cy + 83;
      const optX = cx - 20;

      // 「もう一度走る」テキスト
      ctx.fillStyle = (gameOverSelectIndex === 0) ? "#ffffff" : "#8b92a5";
      ctx.fillText("もう一度走る", optX, opt1Y);

      // 「タイトルに戻る」テキスト
      ctx.fillStyle = (gameOverSelectIndex === 1) ? "#ffffff" : "#8b92a5";
      ctx.fillText("タイトルに戻る", optX, opt2Y);

      // カーソル ▶
      ctx.fillStyle = "#7ee083";
      if (gameOverSelectIndex === 0) {
        ctx.fillText("▶", optX - 25, opt1Y);
      } else {
        ctx.fillText("▶", optX - 25, opt2Y);
      }

      ctx.fillStyle = "#b44a4a";
      ctx.fillRect(panelX + panelW - 82, panelY + 124, 44, 10);
      ctx.fillRect(panelX + panelW - 64, panelY + 94, 10, 40);
      ctx.fillStyle = "#6f2d2d";
      ctx.fillRect(panelX + panelW - 74, panelY + 104, 28, 8);
      return;

      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ff8a80";
      ctx.font = "bold 32px system-ui,sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("ゲームオーバー", canvas.width / 2, canvas.height / 2 - 20);
      ctx.fillStyle = "#fff";
      ctx.font = "18px system-ui,sans-serif";
      ctx.fillText("スコア " + Math.floor(score), canvas.width / 2, canvas.height / 2 + 20);
      ctx.fillText("Enter または タップでリトライ", canvas.width / 2, canvas.height / 2 + 52);
    }
  }

  function render() {
    drawParallax();
    drawGround();
    drawWorld();
    const bottom = groundY - player.alt;
    drawHakase(PLAYER_SCREEN_X, bottom);
    drawHUD();
  }

  function loop(now) {
    const dt = Math.min(0.05, (now - lastFrame) / 1000 || 0);
    lastFrame = now;
    if (state === STATE.PLAYING) update(dt);
    render();
    requestAnimationFrame(loop);
  }

  lastFrame = performance.now();
  requestAnimationFrame(loop);
})();
  </script>
</body>
</html>
