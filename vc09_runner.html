<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>博士ランナー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1d24;
      font-family: system-ui, "Segoe UI", sans-serif;
      touch-action: none;
    }
    #wrap {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #hint {
      color: #8b92a5;
      font-size: 12px;
      padding: 6px 8px;
      text-align: center;
      max-width: 960px;
    }
    #bgmToggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 2;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font: 700 13px system-ui, "Segoe UI", sans-serif;
      padding: 8px 10px;
      cursor: pointer;
    }
    #bgmToggle:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <button id="bgmToggle" type="button" aria-pressed="true">BGM ON</button>
    <audio id="bgm" preload="auto" loop>
      <source src="assets/sounds/Hakase-Runner-Loop.ogg" type="audio/ogg">
      <source src="assets/sounds/Hakase-Runner-Loop.mp3" type="audio/mpeg">
    </audio>
    <canvas id="game" width="960" height="540" tabindex="0" aria-label="博士ランナー ゲーム画面"></canvas>
    <p id="hint">PC: Space/W ジャンプ · ↓/S スライド · Enter スタート/リトライ　スマホ: タップ=ジャンプ · 下スワイプ=スライド</p>
  </div>
  <script>
(function () {
  "use strict";

  const canvas = document.getElementById("game");
  const wrap = document.getElementById("wrap");
  const bgm = document.getElementById("bgm");
  const bgmToggle = document.getElementById("bgmToggle");
  const ctx = canvas.getContext("2d");

  const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };
  let state = STATE.TITLE;

  let cameraX = 0;
  let gameTime = 0;
  let score = 0;
  let lastFrame = 0;
  let gameOverSelectIndex = 0;

  // --- ステージ制・ボス戦の設定（定数） ---
  const STAGE_BOSS_SCORE_BASE = 500;       // ステージ1のボス出現に必要なスコア
  const STAGE_BOSS_SCORE_GROWTH = 200;     // ステージごとのボス出現必要スコア増加量
  const BOSS_CLEAR_POINTS_BASE = 500;      // ステージ1のボス突破に必要なポイント
  const BOSS_CLEAR_POINTS_GROWTH = 200;    // ステージごとのボス突破ポイント増加量
  const STAGE_INTRO_DURATION = 3.0;        // ステージ表示の表示時間（秒）
  const STAGE_CLEAR_DURATION = 3.0;        // STAGE CLEAR表示の表示時間（秒）

  // --- ボス（怪獣）の設定（定数） ---
  const BOSS_WIDTH = 90;                  // ボスの幅
  const BOSS_HEIGHT = 130;                // ボスの高さ
  const BOSS_SCREEN_X = 760;              // ボスの画面内X位置（画面右側付近）

  // --- ボスのアクション設定（定数） ---
  const BOSS_JUMP_INTERVAL = 3.5;         // ボスのジャンプ間隔（秒）
  const BOSS_JUMP_VELOCITY = 650;         // ボスのジャンプ初速
  const BOSS_GRAVITY = 1800;              // ボスにかかる重力
  const BOSS_FIRE_INTERVAL = 2.5;         // 炎を吐く間隔（秒）
  const BOSS_FIRE_SPEED = 450;            // 炎の移動速度（ピクセル/秒）
  const BOSS_FIRE_SIZE = 36;              // 炎の描画サイズ

  // --- ステージ制・ボス戦の状態変数 ---
  let currentStage = 1;                    // 現在のステージ数
  let stageScoreStart = 0;                 // 現在のステージ開始時のスコア
  let isBossBattle = false;                // ボス戦中フラグ
  let bossScoreStart = 0;                  // ボス戦開始時のスコア
  let bossTimeStart = 0;                  // ボス戦開始時のゲーム時間（秒）
  let stageTextTimer = 0;                  // ステージ表示演出用タイマー（秒）
  let stageTextType = "";                  // 演出テキストの種類 ("INTRO", "CLEAR")

  // --- ボス爆発演出の状態変数 ---
  let bossExplosionTimer = 0;              // 爆発演出タイマー（秒）
  let bossExplosionX = 0;                  // 爆発位置のX座標
  let bossExplosionY = 0;                  // 爆発位置のY座標
  let bossParticles = [];                  // 爆発パーティクルの配列

  // --- ボスのアクション状態変数 ---
  let bossAlt = 0;                        // ボスの浮遊高度（地面からの高さ）
  let bossVy = 0;                         // ボスのY方向速度
  let bossOnGround = true;                // ボスの接地フラグ
  let bossJumpTimer = 0;                  // 次のジャンプまでの時間
  let bossFireTimer = 0;                  // 次の炎を吐くまでの時間
  let bossProjectiles = [];               // ボスの炎弾の配列（各要素: { x, y, w, h }）

  const PLAYER_SCREEN_X = 200;
  const GROUND_MARGIN = 100;
  let groundY = 440;

  const MAX_HP = 5;
  const INITIAL_HP = 3;
  const INVINCIBLE_DURATION = 1.5;
  let playerHP = INITIAL_HP;
  let invincibleTimer = 0;

  const GRAVITY = 2400;
  /** 上向きを正とする初速 */
  const JUMP_V = 780;
  const MAX_JUMPS = 2;
  const SLIDE_DURATION = 0.45;
  const SLIDE_COOLDOWN = 0.1;

  let player = {
    vy: 0,
    alt: 0,
    onGround: true,
    jumpsLeft: MAX_JUMPS,
    sliding: false,
    slideT: 0,
    slideCD: 0,
    facing: 1,
  };

  let pits = [];
  let coins = [];
  let enemies = [];
  let obstacles = [];
  let healItems = [];
  let gunItems = [];
  let playerBullets = [];

  let weapon = null;   // null | "gun" | "bazooka"
  let ammo = 0;
  const GUN_AMMO = 5;
  const BAZOOKA_AMMO = 2;
  const BULLET_SPEED = 700;
  const BAZOOKA_SPEED = 420;
  const GUN_ITEM_SPAWN_RATE = 0.08;
  const BAZOOKA_ITEM_SPAWN_RATE = 0.04;
  let bazookaItems = [];
  let bazookaBullets = [];

  let worldEndX = 0;

  const keys = new Set();

  let touchStartY = 0;
  let touchStartX = 0;
  let touchActive = false;
  let bgmEnabled = true;
  let audioCtx = null;
  let gameOverJingleNodes = [];

  bgm.volume = 0.45;

  function getAudioContext() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return null;
    if (!audioCtx) audioCtx = new AudioContextClass();
    return audioCtx;
  }

  function unlockAudio() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state !== "suspended") return;
    const resumePromise = ctx.resume();
    if (resumePromise && typeof resumePromise.catch === "function") {
      resumePromise.catch(function () {});
    }
  }

  function playJumpSfx() {
    const ctx = getAudioContext();
    if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "triangle";
    osc.frequency.setValueAtTime(620, now);
    osc.frequency.exponentialRampToValueAtTime(980, now + 0.09);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.07, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.14);
  }

  function playCoinSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;
    const notes = [
      { t: 0, f: 880 },
      { t: 0.055, f: 1320 },
    ];

    for (let i = 0; i < notes.length; i++) {
      const note = notes[i];
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t0 = now + note.t;
      const t1 = t0 + 0.11;

      osc.type = "square";
      osc.frequency.setValueAtTime(note.f, t0);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.linearRampToValueAtTime(0.045, t0 + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, t1);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t1 + 0.01);
      osc.addEventListener("ended", function () {
        try {
          osc.disconnect();
          gain.disconnect();
        } catch (err) {}
      });
    }
  }

  function playGameOverSfx() {
    const ctx = getAudioContext();
    if (!ctx) return;
    const play = function () {
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "square";
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.setValueAtTime(330, now + 0.12);
      osc.frequency.setValueAtTime(220, now + 0.24);
      osc.frequency.exponentialRampToValueAtTime(110, now + 0.46);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(0.09, now + 0.02);
      gain.gain.setValueAtTime(0.08, now + 0.28);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.52);
    };

    if (ctx.state === "suspended") {
      const resumePromise = ctx.resume();
      if (resumePromise && typeof resumePromise.then === "function") {
        resumePromise.then(play).catch(function () {});
      }
    } else {
      play();
    }
  }

  function playExplosionSfx() {
    const ctx = getAudioContext();
    if (!ctx) return;
    
    const play = function () {
      const now = ctx.currentTime;
      
      // 1. 低音の衝撃音 (Oscillator) - 三角波で下降音を作る
      const osc = ctx.createOscillator();
      const oscGain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(250, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.28);
      
      oscGain.gain.setValueAtTime(0.3, now); // BGMに負けない音量
      oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
      
      osc.connect(oscGain);
      oscGain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.3);
      
      // 2. 爆風のノイズ音 (Noise Source) - バンドパスフィルターで「バシュッ」という音を作る
      const bufferSize = ctx.sampleRate * 0.35; // 0.35秒
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      
      const filter = ctx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(1200, now);
      filter.frequency.exponentialRampToValueAtTime(150, now + 0.32);
      filter.Q.setValueAtTime(3.0, now);
      
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.32, now); // BGMに負けない音量
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
      
      noise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(ctx.destination);
      
      noise.start(now);
      noise.stop(now + 0.36);
      
      // 使用済みのノードを終了後に切断する
      osc.addEventListener("ended", function () {
        try {
          osc.disconnect();
          oscGain.disconnect();
        } catch (err) {}
      });
      noise.addEventListener("ended", function () {
        try {
          noise.disconnect();
          filter.disconnect();
          noiseGain.disconnect();
        } catch (err) {}
      });
    };

    if (ctx.state === "suspended") {
      const resumePromise = ctx.resume();
      if (resumePromise && typeof resumePromise.then === "function") {
        resumePromise.then(play).catch(function () {});
      }
    } else {
      play();
    }
  }

  function playBazookaPickupSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;
    // 重めの2音（低めの矩形波＋ノイズ）
    const notes = [{ t: 0.00, f: 220 }, { t: 0.09, f: 330 }];
    for (let i = 0; i < notes.length; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t0 = now + notes[i].t;
      osc.type = "square";
      osc.frequency.setValueAtTime(notes[i].f, t0);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.linearRampToValueAtTime(0.08, t0 + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.13);
      osc.addEventListener("ended", function () { try { osc.disconnect(); gain.disconnect(); } catch (e) {} });
    }
  }

  function playBazookaShotSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;
    // 低周波の「ドン」＋ノイズ爆発感
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.18);
    oscGain.gain.setValueAtTime(0.15, now);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.20);
    osc.connect(oscGain); oscGain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.21);
    osc.addEventListener("ended", function () { try { osc.disconnect(); oscGain.disconnect(); } catch (e) {} });

    const bufSize = Math.floor(ctx.sampleRate * 0.15);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = "bandpass";
    filter.frequency.setValueAtTime(800, now);
    filter.frequency.exponentialRampToValueAtTime(120, now + 0.15);
    filter.Q.setValueAtTime(2.0, now);
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.12, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
    noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(ctx.destination);
    noise.start(now); noise.stop(now + 0.17);
    noise.addEventListener("ended", function () { try { noise.disconnect(); filter.disconnect(); noiseGain.disconnect(); } catch (e) {} });
  }

  function playGunPickupSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;
    const notes = [{ t: 0.00, f: 440 }, { t: 0.06, f: 660 }, { t: 0.12, f: 880 }];
    for (let i = 0; i < notes.length; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t0 = now + notes[i].t;
      osc.type = "square";
      osc.frequency.setValueAtTime(notes[i].f, t0);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.linearRampToValueAtTime(0.05, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.08);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.09);
      osc.addEventListener("ended", function () { try { osc.disconnect(); gain.disconnect(); } catch (e) {} });
    }
  }

  function playGunShotSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.07);
    gain.gain.setValueAtTime(0.07, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.09);
    osc.addEventListener("ended", function () { try { osc.disconnect(); gain.disconnect(); } catch (e) {} });
  }

  function playGunHitSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.exponentialRampToValueAtTime(200, now + 0.09);
    gain.gain.setValueAtTime(0.06, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.11);
    osc.addEventListener("ended", function () { try { osc.disconnect(); gain.disconnect(); } catch (e) {} });
  }

  function playHealSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;
    const notes = [
      { t: 0.00, f: 660 },
      { t: 0.07, f: 880 },
      { t: 0.14, f: 1100 },
    ];
    for (let i = 0; i < notes.length; i++) {
      const note = notes[i];
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t0 = now + note.t;
      const t1 = t0 + 0.1;
      osc.type = "triangle";
      osc.frequency.setValueAtTime(note.f, t0);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.linearRampToValueAtTime(0.055, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t1);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t1 + 0.01);
      osc.addEventListener("ended", function () {
        try { osc.disconnect(); gain.disconnect(); } catch (e) {}
      });
    }
  }

  function playDamageSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;

    // 短い下降ノイズ（「ビシッ」レトロ風）
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(520, now);
    osc.frequency.exponentialRampToValueAtTime(140, now + 0.12);
    oscGain.gain.setValueAtTime(0.0001, now);
    oscGain.gain.linearRampToValueAtTime(0.06, now + 0.008);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
    osc.connect(oscGain);
    oscGain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.14);
    osc.addEventListener("ended", function () {
      try { osc.disconnect(); oscGain.disconnect(); } catch (e) {}
    });

    // 薄いノイズ成分で「シャッ」感を足す
    const bufSize = Math.floor(ctx.sampleRate * 0.08);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = "highpass";
    filter.frequency.setValueAtTime(3000, now);
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.04, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    noise.start(now);
    noise.stop(now + 0.09);
    noise.addEventListener("ended", function () {
      try { noise.disconnect(); filter.disconnect(); noiseGain.disconnect(); } catch (e) {}
    });
  }

  function playFireSfx() {
    const ctx = getAudioContext();
    if (!ctx || ctx.state === "suspended") return;
    const now = ctx.currentTime;
    
    // 短いノイズ発射音 ("シュッ" / "ボッ")
    const bufferSize = ctx.sampleRate * 0.12; // 0.12秒
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    
    const filter = ctx.createBiquadFilter();
    filter.type = "bandpass";
    filter.frequency.setValueAtTime(2000, now);
    filter.frequency.exponentialRampToValueAtTime(600, now + 0.1);
    filter.Q.setValueAtTime(4.0, now);
    
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.08, now); // 控えめな音量
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    
    noise.start(now);
    noise.stop(now + 0.12);
  }

  function stopGameOverJingle() {
    for (let i = 0; i < gameOverJingleNodes.length; i++) {
      try {
        gameOverJingleNodes[i].stop();
      } catch (err) {
        /* The node may have already finished. */
      }
      try {
        gameOverJingleNodes[i].disconnect();
      } catch (err) {
        /* Disconnect is best-effort cleanup for finished nodes. */
      }
    }
    gameOverJingleNodes = [];
  }

  function playGameOverJingle() {
    const ctx = getAudioContext();
    if (!ctx) return;
    stopGameOverJingle();

    const play = function () {
      const start = ctx.currentTime + 0.58;
      const notes = [
        { t: 0.00, f: 392, d: 0.16 },
        { t: 0.18, f: 349, d: 0.16 },
        { t: 0.36, f: 294, d: 0.2 },
        { t: 0.62, f: 247, d: 0.42 },
      ];

      for (let i = 0; i < notes.length; i++) {
        const note = notes[i];
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const t0 = start + note.t;
        const t1 = t0 + note.d;

        osc.type = "triangle";
        osc.frequency.setValueAtTime(note.f, t0);
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.linearRampToValueAtTime(0.07, t0 + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, t1);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t0);
        osc.stop(t1 + 0.02);
        osc.addEventListener("ended", function () {
          try {
            osc.disconnect();
            gain.disconnect();
          } catch (err) {}
        });
        gameOverJingleNodes.push(osc);
      }
    };

    if (ctx.state === "suspended") {
      const resumePromise = ctx.resume();
      if (resumePromise && typeof resumePromise.then === "function") {
        resumePromise.then(play).catch(function () {});
      }
    } else {
      play();
    }
  }

  function updateBgmButton() {
    bgmToggle.textContent = bgmEnabled ? "BGM ON" : "BGM OFF";
    bgmToggle.setAttribute("aria-pressed", bgmEnabled ? "true" : "false");
  }

  function playBgm(restart) {
    if (!bgmEnabled || state !== STATE.PLAYING) return;
    if (restart) {
      try {
        bgm.currentTime = 0;
      } catch (err) {
        /* Some browsers may block seeking before metadata is ready. */
      }
    }
    const playPromise = bgm.play();
    if (playPromise && typeof playPromise.catch === "function") {
      playPromise.catch(function () {
        /* Autoplay restrictions are expected until a user gesture starts the game. */
      });
    }
  }

  function pauseBgm() {
    bgm.pause();
  }

  function takeDamage() {
    if (invincibleTimer > 0) return;
    playerHP--;
    playDamageSfx();
    if (playerHP <= 0) {
      setGameOver();
    } else {
      invincibleTimer = INVINCIBLE_DURATION;
    }
  }

  function setGameOver() {
    if (state === STATE.GAMEOVER) return;
    state = STATE.GAMEOVER;
    gameOverSelectIndex = 0;
    pauseBgm();
    playGameOverSfx();
    playGameOverJingle();
  }

  function goToTitle() {
    stopGameOverJingle();
    state = STATE.TITLE;
    try {
      canvas.focus({ preventScroll: true });
    } catch (err) {
      canvas.focus();
    }
  }

  function toggleBgm() {
    bgmEnabled = !bgmEnabled;
    updateBgmButton();
    if (bgmEnabled) {
      playBgm(false);
    } else {
      pauseBgm();
    }
  }

  updateBgmButton();

  function resize() {
    const maxW = window.innerWidth;
    const maxH = window.innerHeight - 40;
    const r = Math.min(maxW / 960, maxH / 540, 1);
    canvas.style.width = Math.floor(960 * r) + "px";
    canvas.style.height = Math.floor(540 * r) + "px";
    groundY = 540 - GROUND_MARGIN;
  }
  window.addEventListener("resize", resize);
  resize();

  function scrollSpeed() {
    return 220 + Math.min(180, gameTime * 8);
  }

  function spawnDifficulty() {
    return Math.min(1, gameTime / 120);
  }

  function resetGame() {
    unlockAudio();
    stopGameOverJingle();
    cameraX = 0;
    gameTime = 0;
    score = 0;
    player.vy = 0;
    player.alt = 0;
    player.onGround = true;
    player.jumpsLeft = MAX_JUMPS;
    player.sliding = false;
    player.slideT = 0;
    player.slideCD = 0;
    pits = [];
    coins = [];
    enemies = [];
    obstacles = [];
    healItems = [];
    gunItems = [];
    playerBullets = [];
    bazookaItems = [];
    bazookaBullets = [];
    weapon = null;
    ammo = 0;
    worldEndX = 1200;
    state = STATE.PLAYING;
    lastFrame = performance.now();
    currentStage = 1;
    stageScoreStart = 0;
    isBossBattle = false;
    bossScoreStart = 0;
    bossTimeStart = 0;
    bossExplosionTimer = 0;
    bossExplosionX = 0;
    bossExplosionY = 0;
    bossParticles = [];
    bossAlt = 0;
    bossVy = 0;
    bossOnGround = true;
    bossJumpTimer = BOSS_JUMP_INTERVAL;
    bossFireTimer = BOSS_FIRE_INTERVAL;
    bossProjectiles = [];
    playerHP = INITIAL_HP;
    invincibleTimer = 0;
    stageTextTimer = STAGE_INTRO_DURATION;
    stageTextType = "INTRO";
    ensureWorld(2500);
    playBgm(true);
  }

  function isOverPit(feetWorldX, hitWidth) {
    const left = feetWorldX - hitWidth / 2;
    const right = feetWorldX + hitWidth / 2;
    for (let i = 0; i < pits.length; i++) {
      const p = pits[i];
      if (right > p.left + 2 && left < p.right - 2) return true;
    }
    return false;
  }

  function playerHitSize() {
    const w = 34;
    const h = player.sliding ? 28 : 72;
    return { w, h };
  }

  function playerFeetWorldX() {
    return cameraX + PLAYER_SCREEN_X;
  }

  function playerAABB() {
    const feetX = playerFeetWorldX();
    const { w, h } = playerHitSize();
    const bottom = groundY - player.alt;
    const top = bottom - h;
    return { left: feetX - w / 2, right: feetX + w / 2, top, bottom };
  }

  function aabbOverlap(a, b) {
    return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
  }

  function ensureWorld(minX) {
    while (worldEndX < minX) {
      const chunkStart = worldEndX;
      const chunkW = 480 + Math.random() * 260;
      const chunkEnd = chunkStart + chunkW;
      const d = spawnDifficulty();
      let pit = null;

      if (!isBossBattle && Math.random() < 0.28 + d * 0.22) {
        const pitW = 60 + Math.random() * (70 + d * 50);
        const margin = 180;
        const pitLeft = chunkStart + margin + Math.random() * Math.max(40, chunkW - pitW - margin * 2);
        const pitRight = pitLeft + pitW;
        pit = { left: pitLeft, right: pitRight };
        pits.push(pit);
      }

      const spawnCount = 1 + (Math.random() < d * 0.25 ? 1 : 0);
      const hazardXs = [];
      for (let s = 0; s < spawnCount; s++) {
        let ex = chunkStart + 120 + Math.random() * (chunkW - 240);
        let tries = 0;
        while (
          tries < 8 &&
          ((pit && ex > pit.left - 150 && ex < pit.right + 150) ||
            hazardXs.some(function (x) { return Math.abs(x - ex) < 190; }))
        ) {
          ex = chunkStart + 120 + Math.random() * (chunkW - 240);
          tries++;
        }
        if ((pit && ex > pit.left - 130 && ex < pit.right + 130) ||
            hazardXs.some(function (x) { return Math.abs(x - ex) < 170; })) {
          continue;
        }
        hazardXs.push(ex);
        const roll = Math.random();
        if (roll < 0.28) {
          enemies.push({
            kind: "walker",
            x: ex,
            w: 40,
            h: 44,
            vx: -40 - Math.random() * 30 - d * 20,
          });
        } else if (roll < 0.52) {
          enemies.push({
            kind: "floater",
            x: ex,
            y: groundY - (110 + Math.random() * 70),
            w: 46,
            h: 36,
            phase: Math.random() * Math.PI * 2,
            amp: 18 + Math.random() * 12,
          });
        } else if (roll < 0.72) {
          enemies.push({
            kind: "bouncer",
            x: ex,
            baseY: groundY,
            w: 38,
            h: 38,
            vy: 520 + Math.random() * 220 + d * 120,
            gravity: GRAVITY * 1.05,
          });
        } else if (roll < 0.88) {
          obstacles.push({
            x: ex - 22,
            w: 44,
            h: 52,
          });
        } else {
          coins.push({ x: ex, y: groundY - 28 - Math.random() * 90, r: 14, taken: false });
        }
      }

      if (Math.random() < 0.55 + d * 0.2) {
        const cx = chunkStart + 60 + Math.random() * (chunkW - 120);
        coins.push({ x: cx, y: groundY - 32 - Math.random() * 50, r: 14, taken: false });
      }

      // 回復アイテム（低確率でスポーン）
      if (Math.random() < 0.20) {
        const hx = chunkStart + 80 + Math.random() * (chunkW - 160);
        healItems.push({ x: hx, y: groundY - 36, r: 14, taken: false });
      }

      // 銃アイテム（低確率でスポーン）
      if (!isBossBattle && Math.random() < GUN_ITEM_SPAWN_RATE) {
        const gx = chunkStart + 80 + Math.random() * (chunkW - 160);
        gunItems.push({ x: gx, y: groundY - 36, taken: false });
      }

      // バズーカアイテム（銃より低確率でスポーン）
      if (!isBossBattle && Math.random() < BAZOOKA_ITEM_SPAWN_RATE) {
        const bx = chunkStart + 80 + Math.random() * (chunkW - 160);
        bazookaItems.push({ x: bx, y: groundY - 36, taken: false });
      }

      worldEndX = chunkEnd;
    }
  }

  function cullOffscreen() {
    const cut = cameraX - 400;
    pits = pits.filter(function (p) { return p.right > cut; });
    coins = coins.filter(function (c) { return c.x > cut; });
    enemies = enemies.filter(function (e) { return e.x > cut; });
    obstacles = obstacles.filter(function (o) { return o.x + o.w > cut; });
    healItems = healItems.filter(function (h) { return h.x > cut; });
    gunItems = gunItems.filter(function (g) { return g.x > cut; });
    bazookaItems = bazookaItems.filter(function (g) { return g.x > cut; });
    playerBullets = playerBullets.filter(function (b) { return b.x < cameraX + canvas.width + 100; });
    bazookaBullets = bazookaBullets.filter(function (b) { return b.x < cameraX + canvas.width + 100; });
  }

  function tryJump() {
    if (state !== STATE.PLAYING) return;
    if (player.jumpsLeft > 0 && !player.sliding) {
      unlockAudio();
      player.vy = JUMP_V;
      player.onGround = false;
      player.jumpsLeft--;
      playJumpSfx();
    }
  }

  function trySlide() {
    if (state !== STATE.PLAYING) return;
    if (player.slideCD > 0) return;
    if (player.onGround) {
      player.sliding = true;
      player.slideT = SLIDE_DURATION;
    }
  }

  function tryFireGun() {
    if (state !== STATE.PLAYING) return;
    if (!weapon || ammo <= 0) return;
    const originX = cameraX + PLAYER_SCREEN_X + 20;
    const bulletY = groundY - player.alt - 40;
    if (weapon === "gun") {
      playerBullets.push({ x: originX, y: bulletY, w: 12, h: 6 });
      playGunShotSfx();
    } else if (weapon === "bazooka") {
      bazookaBullets.push({ x: originX, y: bulletY, w: 22, h: 10 });
      playBazookaShotSfx();
    }
    ammo--;
    if (ammo <= 0) {
      weapon = null;
      ammo = 0;
    }
  }

  function isEnterKey(e) {
    return e.key === "Enter" || e.code === "Enter" || e.code === "NumpadEnter";
  }

  document.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.key === " ") e.preventDefault();
    unlockAudio();
    keys.add(e.code);
    
    if (state === STATE.GAMEOVER) {
      if ((e.code === "ArrowUp" || e.code === "KeyW") && !e.repeat) {
        gameOverSelectIndex = 0;
      }
      if ((e.code === "ArrowDown" || e.code === "KeyS") && !e.repeat) {
        gameOverSelectIndex = 1;
      }
    } else {
      if ((e.code === "Space" || e.code === "KeyW") && !e.repeat) tryJump();
      if ((e.code === "ArrowDown" || e.code === "KeyS") && !e.repeat) trySlide();
      if (e.code === "KeyZ" && !e.repeat) tryFireGun();
    }
    
    if (e.code === "KeyM" && !e.repeat) toggleBgm();
    
    if (isEnterKey(e) && !e.repeat) {
      if (state === STATE.TITLE) {
        e.preventDefault();
        resetGame();
      } else if (state === STATE.GAMEOVER) {
        e.preventDefault();
        if (gameOverSelectIndex === 0) {
          resetGame();
        } else {
          goToTitle();
        }
      }
    }
  }, { passive: false });

  document.addEventListener("keyup", function (e) {
    keys.delete(e.code);
  });

  bgmToggle.addEventListener("pointerdown", function (e) {
    e.stopPropagation();
  });

  bgmToggle.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    unlockAudio();
    toggleBgm();
  });

  wrap.addEventListener("pointerdown", function (e) {
    unlockAudio();
    if (state === STATE.TITLE) {
      e.preventDefault();
      touchActive = true;
      touchStartY = e.clientY;
      touchStartX = e.clientX;
      resetGame();
      try {
        canvas.focus({ preventScroll: true });
      } catch (err) {
        canvas.focus();
      }
      return;
    }
  }, { passive: false });

  canvas.addEventListener("pointerdown", function (e) {
    unlockAudio();
    if (state === STATE.PLAYING) {
      e.preventDefault();
      touchActive = true;
      touchStartY = e.clientY;
      touchStartX = e.clientX;
      tryJump();
    } else if (state === STATE.GAMEOVER) {
      e.preventDefault();
      e.stopPropagation();
      const rect = canvas.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 960;
      const y = ((e.clientY - rect.top) / rect.height) * 540;
      
      if (x >= 430 && x <= 730 && y >= 295 && y <= 330) {
        try { canvas.focus({ preventScroll: true }); } catch (err) { canvas.focus(); }
        resetGame();
      } else if (x >= 430 && x <= 730 && y >= 330 && y <= 365) {
        try { canvas.focus({ preventScroll: true }); } catch (err) { canvas.focus(); }
        goToTitle();
      }
    }
  }, { passive: false });

  canvas.addEventListener("pointermove", function (e) {
    if (state !== STATE.GAMEOVER) return;
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 960;
    const y = ((e.clientY - rect.top) / rect.height) * 540;
    if (x >= 430 && x <= 730) {
      if (y >= 295 && y <= 330) {
        gameOverSelectIndex = 0;
      } else if (y >= 330 && y <= 365) {
        gameOverSelectIndex = 1;
      }
    }
  });

  document.addEventListener("pointerup", function (e) {
    if (!touchActive) return;
    touchActive = false;
    const dy = e.clientY - touchStartY;
    const dx = e.clientX - touchStartX;
    if (dy > 55 && Math.abs(dy) > Math.abs(dx) * 0.6) trySlide();
  }, { passive: false });

  document.addEventListener("pointercancel", function () {
    touchActive = false;
  });

  function update(dt) {
    if (state !== STATE.PLAYING) return;

    gameTime += dt;
    const spd = scrollSpeed();
    cameraX += spd * dt;

    score += dt * 12;
    ensureWorld(cameraX + 1400);

    // --- ステージ・ボス戦の演出タイマー更新 ---
    if (stageTextTimer > 0) {
      stageTextTimer -= dt;
      if (stageTextTimer <= 0) {
        if (stageTextType === "CLEAR") {
          // 次のステージへ進行
          currentStage++;
          stageScoreStart = score;
          stageTextTimer = STAGE_INTRO_DURATION;
          stageTextType = "INTRO";
        } else {
          stageTextType = "";
        }
      }
    }

    // --- ボス戦の開始判定 ---
    const requiredBossScore = STAGE_BOSS_SCORE_BASE + (currentStage - 1) * STAGE_BOSS_SCORE_GROWTH;
    if (!isBossBattle && stageTextType !== "CLEAR") {
      if (score - stageScoreStart >= requiredBossScore) {
        isBossBattle = true;
        bossScoreStart = score;
        bossTimeStart = gameTime;
        bossAlt = 0;
        bossVy = 0;
        bossOnGround = true;
        bossJumpTimer = BOSS_JUMP_INTERVAL;
        bossFireTimer = BOSS_FIRE_INTERVAL;
        bossProjectiles = [];
      }
    }

    // --- ボス戦クリアの判定 ---
    if (isBossBattle) {
      const requiredPoints = BOSS_CLEAR_POINTS_BASE + (currentStage - 1) * BOSS_CLEAR_POINTS_GROWTH;
      if (score - bossScoreStart >= requiredPoints) {
        isBossBattle = false;
        stageTextTimer = STAGE_CLEAR_DURATION;
        stageTextType = "CLEAR";

        // --- 爆発演出の初期化 ---
        const elapsed = gameTime - bossTimeStart;
        const slideInProgress = Math.min(1.0, elapsed / 1.5);
        bossExplosionX = (canvas.width + 100) - ((canvas.width + 100) - BOSS_SCREEN_X) * slideInProgress;
        bossExplosionY = groundY - 65; // ボスのほぼ中心 (groundY - BOSS_HEIGHT/2)
        bossExplosionTimer = 1.2;
        playExplosionSfx(); // 爆発音の再生

        bossParticles = [];
        const colors = ["#ff5f6d", "#ff8a80", "#ffe987", "#f0c052", "#ffffff"];
        for (let i = 0; i < 40; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 50 + Math.random() * 200;
          bossParticles.push({
            x: 0,
            y: 0,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 50,
            size: 6 + Math.random() * 12,
            color: colors[Math.floor(Math.random() * colors.length)],
            life: 0.6 + Math.random() * 0.6,
            age: 0
          });
        }

        // ボスアクション状態と炎弾をリセット
        bossProjectiles = [];
        bossAlt = 0;
        bossVy = 0;
      }
    }

    // --- ボスアクションの更新 ---
    if (isBossBattle) {
      // 1. ジャンプ物理演算
      bossVy -= BOSS_GRAVITY * dt;
      bossAlt += bossVy * dt;
      if (bossAlt <= 0) {
        bossAlt = 0;
        bossVy = 0;
        bossOnGround = true;
      } else {
        bossOnGround = false;
      }

      // 2. ジャンプタイマー更新
      bossJumpTimer -= dt;
      if (bossJumpTimer <= 0) {
        if (bossOnGround) {
          bossVy = BOSS_JUMP_VELOCITY;
          bossOnGround = false;
        }
        bossJumpTimer = BOSS_JUMP_INTERVAL;
      }

      // 3. 炎発射タイマー更新
      bossFireTimer -= dt;
      if (bossFireTimer <= 0) {
        const elapsed = gameTime - bossTimeStart;
        const slideInProgress = Math.min(1.0, elapsed / 1.5);
        const currentBossX = (canvas.width + 100) - ((canvas.width + 100) - BOSS_SCREEN_X) * slideInProgress;
        
        // 炎弾をボスの口元あたりから射出
        bossProjectiles.push({
          x: currentBossX - 50,
          y: groundY - bossAlt - 125,
          w: BOSS_FIRE_SIZE,
          h: BOSS_FIRE_SIZE - 10
        });
        playFireSfx(); // 炎発射音
        bossFireTimer = BOSS_FIRE_INTERVAL;
      }
    }

    // --- 炎弾の移動・画面外削除・当たり判定 ---
    for (let i = bossProjectiles.length - 1; i >= 0; i--) {
      const f = bossProjectiles[i];
      f.x -= BOSS_FIRE_SPEED * dt;
      
      // 画面左外へ出たら削除
      if (f.x + f.w < 0) {
        bossProjectiles.splice(i, 1);
        continue;
      }
      
      // 博士との当たり判定 (AABB) — 炎はスクリーン座標のため専用のプレイヤーBoxを使う
      const fireHitBox = {
        left: f.x + 6,
        right: f.x + f.w - 6,
        top: f.y + 6,
        bottom: f.y + f.h - 6
      };
      const _fhs = playerHitSize();
      const _fbottom = groundY - player.alt;
      const playerBox = {
        left:   PLAYER_SCREEN_X - _fhs.w / 2,
        right:  PLAYER_SCREEN_X + _fhs.w / 2,
        top:    _fbottom - _fhs.h,
        bottom: _fbottom
      };
      if (aabbOverlap(playerBox, fireHitBox)) {
        takeDamage();
        if (state === STATE.GAMEOVER) return;
      }
    }

    // --- 爆発演出の更新 ---
    if (bossExplosionTimer > 0) {
      bossExplosionTimer -= dt;
      for (let i = 0; i < bossParticles.length; i++) {
        const p = bossParticles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 200 * dt; // 重力
        p.age += dt;
      }
    }

    if (invincibleTimer > 0) invincibleTimer -= dt;

    if (player.slideCD > 0) player.slideCD -= dt;
    if (player.sliding) {
      player.slideT -= dt;
      if (player.slideT <= 0) {
        player.sliding = false;
        player.slideCD = SLIDE_COOLDOWN;
      }
    }

    const feetX = playerFeetWorldX();
    const hitSize = playerHitSize();
    const overPit = isOverPit(feetX, hitSize.w);

    player.vy -= GRAVITY * dt;
    player.alt += player.vy * dt;

    if (!overPit) {
      if (player.alt < 0) {
        player.alt = 0;
        if (player.vy < 0) player.vy = 0;
      }
      player.onGround = player.alt <= 0.5 && player.vy <= 0.5;
      if (player.onGround) player.jumpsLeft = MAX_JUMPS;
    } else {
      player.onGround = false;
      if (player.alt < -80) {
        takeDamage();
        if (state === STATE.GAMEOVER) return;
        player.alt = 0;
        player.vy = 0;
      }
    }

    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (e.kind === "walker") {
        e.x += (e.vx - spd) * dt;
      } else if (e.kind === "floater") {
        e.x -= spd * dt;
        e.phase += dt * 3;
        e._y = e.y + Math.sin(e.phase) * e.amp;
      } else if (e.kind === "bouncer") {
        e.x -= spd * dt;
        e.vy -= e.gravity * dt;
        e.baseY -= e.vy * dt;
        if (e.baseY > groundY) {
          e.baseY = groundY;
          e.vy = 520 + Math.random() * 220 + spawnDifficulty() * 140;
        }
      }
    }

    for (let i = 0; i < obstacles.length; i++) {
      obstacles[i].x -= spd * dt;
    }

    for (let i = 0; i < coins.length; i++) {
      const c = coins[i];
      if (c.taken) continue;
      c.x -= spd * dt;
    }

    for (let i = 0; i < healItems.length; i++) {
      const h = healItems[i];
      if (h.taken) continue;
      h.x -= spd * dt;
    }

    for (let i = 0; i < pits.length; i++) {
      /* pits static in world */
    }

    const ph = playerAABB();

    for (let i = 0; i < healItems.length; i++) {
      const h = healItems[i];
      if (h.taken) continue;
      const hr = {
        left: h.x - h.r,
        right: h.x + h.r,
        top: h.y - h.r,
        bottom: h.y + h.r,
      };
      if (aabbOverlap(ph, hr)) {
        h.taken = true;
        if (playerHP < MAX_HP) {
          playerHP++;
        } else {
          score += 100;
        }
        playHealSfx();
      }
    }

    for (let i = 0; i < coins.length; i++) {

      const cr = {

  function drawParallax() {
    const w = canvas.width;
    const h = canvas.height;
    const sky0 = ctx.createLinearGradient(0, 0, 0, h);
    sky0.addColorStop(0, "#6eb8ff");
    sky0.addColorStop(0.55, "#9addff");
    sky0.addColorStop(1, "#d5f6ff");
    ctx.fillStyle = sky0;
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = "rgba(255,255,255,0.22)";
    for (let y = 32; y < groundY - 150; y += 36) {
      const dashOff = (Math.floor(cameraX * 0.02) + y) % 64;
      for (let x = -dashOff; x < w; x += 64) {
        ctx.fillRect(x, y, 18, 2);

    ctx.fillStyle = "#fff2a8";
    ctx.beginPath();
    ctx.arc(w - 118, 82, 34, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.fillRect(w - 150, 80, 64, 4);
    ctx.fillRect(w - 140, 96, 42, 4);

    const cloudOff = (cameraX * 0.07) % 260;
    for (let i = -1; i < 5; i++) {
      const cx = i * 260 - cloudOff;
      const cy = 62 + (i % 3) * 30;
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.fillRect(cx, cy + 18, 96, 18);
      ctx.fillRect(cx + 18, cy + 6, 34, 18);
      ctx.fillRect(cx + 46, cy, 38, 24);
      ctx.fillRect(cx + 76, cy + 10, 38, 20);
      ctx.fillStyle = "rgba(116,164,210,0.28)";
      ctx.fillRect(cx + 8, cy + 34, 88, 4);
    }

    const mountainOff = (cameraX * 0.12) % 360;
    for (let i = -1; i < 5; i++) {
      const mx = i * 360 - mountainOff;
      ctx.fillStyle = "#7fa6bf";
      ctx.beginPath();
      ctx.moveTo(mx - 60, groundY);
      ctx.lineTo(mx + 115, groundY - 188);
      ctx.lineTo(mx + 290, groundY);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#a7c7d6";
      ctx.beginPath();
      ctx.moveTo(mx + 115, groundY - 188);
      ctx.lineTo(mx + 155, groundY - 76);
      ctx.lineTo(mx + 82, groundY - 102);
      ctx.closePath();
      ctx.fill();
    }

    const hillFarOff = (cameraX * 0.22) % 420;
    ctx.fillStyle = "#73ad78";
    for (let i = -1; i < 4; i++) {
      const hx = i * 420 - hillFarOff;
      ctx.beginPath();
      ctx.moveTo(hx, groundY);
      ctx.quadraticCurveTo(hx + 210, groundY - 115, hx + 420, groundY);
      ctx.lineTo(hx + 420, groundY);
      ctx.lineTo(hx, groundY);
      ctx.fill();
    }

    const hillNearOff = (cameraX * 0.36) % 300;
    ctx.fillStyle = "#4f8b63";
    for (let i = -1; i < 5; i++) {
      const hx = i * 300 - hillNearOff;
      ctx.beginPath();
      ctx.moveTo(hx, groundY);
      ctx.quadraticCurveTo(hx + 150, groundY - 72, hx + 300, groundY);
      ctx.lineTo(hx + 300, groundY);
      ctx.lineTo(hx, groundY);
      ctx.fill();
    }

    const forestOff = (cameraX * 0.5) % 96;
    for (let x = -96 - forestOff; x < w + 96; x += 48) {
      const treeH = 42 + ((x / 48) & 1) * 14;
      ctx.fillStyle = "#2f6f52";
      ctx.fillRect(x + 20, groundY - treeH + 18, 8, treeH - 18);
      ctx.beginPath();
      ctx.moveTo(x + 24, groundY - treeH);
      ctx.lineTo(x + 4, groundY - 14);
      ctx.lineTo(x + 44, groundY - 14);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      ctx.fillRect(x + 18, groundY - treeH + 18, 12, 4);
    }
  }

  function drawGround() {
    const w = canvas.width;
    const h = canvas.height;
    const gy = groundY;

    const dirt = ctx.createLinearGradient(0, gy, 0, h);
    dirt.addColorStop(0, "#b8844c");
    dirt.addColorStop(1, "#7a4e32");
    ctx.fillStyle = dirt;
    ctx.fillRect(0, gy, w, h - gy);

    ctx.fillStyle = "#68a848";
    ctx.fillRect(0, gy - 10, w, 10);
    ctx.fillStyle = "#9bd15f";
    ctx.fillRect(0, gy - 14, w, 5);
    ctx.fillStyle = "#3f7b3f";
    for (let gx = -((cameraX * 1.1) % 24); gx < w; gx += 24) {
      ctx.fillRect(gx, gy - 14, 12, 4);
      ctx.fillRect(gx + 8, gy - 6, 16, 3);
    }

    const tile = 32;
    const tileOff = ((cameraX % tile) + tile) % tile;
    ctx.strokeStyle = "rgba(83,52,34,0.45)";
    ctx.lineWidth = 2;
    for (let gx = -tileOff; gx < w; gx += tile) {
      ctx.beginPath();
      ctx.moveTo(gx, gy + 6);
      ctx.lineTo(gx, h);
      ctx.stroke();
    }
    for (let yy = gy + 22; yy < h; yy += tile) {
      ctx.beginPath();
      ctx.moveTo(0, yy);
      ctx.lineTo(w, yy);
      ctx.stroke();
    }

    for (let gx = -tileOff; gx < w + tile; gx += tile) {
      const rowShift = Math.floor((gx + tileOff) / tile) % 2;
      ctx.fillStyle = rowShift ? "rgba(246,190,98,0.28)" : "rgba(92,55,33,0.2)";
      ctx.fillRect(gx + 7, gy + 17, 10, 5);
      ctx.fillRect(gx + 21, gy + 50, 7, 4);
    }

    ctx.fillStyle = "#5a4a3a";
    for (let i = 0; i < pits.length; i++) {
      const p = pits[i];
      const l = p.left - cameraX;
      const r = p.right - cameraX;
      if (r < 0 || l > w) continue;
      const pitL = Math.max(0, l);
      const pitR = Math.min(w, r);
      const pitW = pitR - pitL;
      ctx.fillStyle = "#3d3028";
      ctx.fillRect(pitL, gy - 8, pitW, h - gy + 8);
      ctx.fillStyle = "#2a2520";
      ctx.fillRect(pitL + 4, gy + 8, Math.max(0, pitW - 8), h - gy - 8);
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(pitL, gy - 8, pitW, 8);
    }
  }

      ctx.fillRect(sx + 8, y - 31, 3, 3);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(sx + 11, y - 27, 6, 3);
      ctx.fillStyle = "#e0b7b7";
      ctx.fillRect(sx + 9, y - 14, 5, 4);

  }

  function drawBoss(screenX, bottomY) {
    const cx = screenX;
    const base = bottomY;
    const bob = Math.sin(gameTime * 8) * 3;

    ctx.save();
    ctx.translate(cx, base);

    // 影 (Shadow)
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(-50, -5, 100, 7);

    // 足 (Legs/Claws)
    ctx.fillStyle = "#1e3d2f"; // 暗い緑
    ctx.fillRect(10, -25, 25, 25);
    ctx.fillRect(-25, -25, 25, 25);
    
    ctx.fillStyle = "#2d5e46"; // メインの緑
    ctx.fillRect(15, -20, 15, 20);
    ctx.fillRect(-20, -20, 15, 20);
    ctx.fillStyle = "#fff"; // 爪
    ctx.fillRect(15, -5, 6, 5);
    ctx.fillRect(-20, -5, 6, 5);

    // 尻尾 (Tail) - 右側に伸びる
    ctx.fillStyle = "#2d5e46";
    ctx.fillRect(25, -50, 45, 20);
    ctx.fillRect(50, -40, 30, 15);
    ctx.fillStyle = "#1e3d2f";
    ctx.fillRect(25, -30, 35, 10);
    // 尻尾のトゲ (Tail spikes)
    ctx.fillStyle = "#e05a5a"; // 赤いトゲ
    ctx.fillRect(40, -56, 8, 6);
    ctx.fillRect(65, -46, 6, 6);

    // 胴体 (Torso)
    ctx.fillStyle = "#2d5e46"; // メインの緑
    ctx.fillRect(-35, -100, 75, 80);
    // お腹 (Belly) - 左下
    ctx.fillStyle = "#f0c052"; // 黄色
    ctx.fillRect(-35, -75, 20, 50);
    ctx.fillRect(-25, -85, 20, 10);

    // 背中のトゲ (Back Spikes) - 右側
    ctx.fillStyle = "#e05a5a";
    ctx.fillRect(40, -90, 8, 16);
    ctx.fillRect(40, -65, 8, 16);
    ctx.fillRect(40, -40, 8, 16);

    // 首 (Neck) - ボブ（縦揺れ）を適用
    ctx.fillStyle = "#2d5e46";
    ctx.fillRect(-30, -115 + bob, 45, 25);

    // 頭 (Head) - 左向き
    ctx.fillStyle = "#2d5e46";
    ctx.fillRect(-50, -140 + bob, 60, 30); // 頭部メイン
    ctx.fillRect(-45, -118 + bob, 50, 10); // 下顎

    // 目 (Angry Eye) - 左向きなので左側に配置
    ctx.fillStyle = "#ff5f6d"; // 赤
    ctx.fillRect(-42, -134 + bob, 10, 8);
    ctx.fillStyle = "#fff"; // 瞳
    ctx.fillRect(-42, -132 + bob, 4, 4);

    // 鼻・角 (Horn)
    ctx.fillStyle = "#ffe987";
    ctx.fillRect(-56, -136 + bob, 6, 6); // 鼻先の角
    ctx.fillRect(0, -146 + bob, 8, 8);   // 頭の上の角

    // 牙 (Teeth)
    ctx.fillStyle = "#fff";
    ctx.fillRect(-45, -112 + bob, 4, 4);
    ctx.fillRect(-35, -112 + bob, 4, 4);
    ctx.fillRect(-25, -112 + bob, 4, 4);

    ctx.restore();
  }

  function drawBossExplosion() {
    ctx.save();
    ctx.translate(bossExplosionX, bossExplosionY);
    
    // レトロな円形膨張エフェクト（爆風リング）
    const progress = Math.max(0, 1.2 - bossExplosionTimer) / 1.2; // 0.0 to 1.0
    
    // 赤・オレンジ・黄色の同心円
    ctx.beginPath();
    ctx.fillStyle = "rgba(255, 95, 109, " + (0.5 * (1 - progress)) + ")";
    ctx.arc(0, 0, progress * 130, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.fillStyle = "rgba(240, 192, 82, " + (0.6 * (1 - progress)) + ")";
    ctx.arc(0, 0, progress * 90, 0, Math.PI * 2);
    ctx.fill();

    // パーティクルの描画（四角形でドット絵感）
    for (let i = 0; i < bossParticles.length; i++) {
      const p = bossParticles[i];
      if (p.age >= p.life) continue;
      
      const alpha = 1.0 - (p.age / p.life);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      
      // ドット感のある四角形パーティクル
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.restore();
  }

  function drawBossProjectiles() {
    for (let i = 0; i < bossProjectiles.length; i++) {
      const f = bossProjectiles[i];
      
      ctx.save();
      // 火の玉の中心
      ctx.translate(f.x + f.w / 2, f.y + f.h / 2);
      
      // パラパラとゆらめくアニメーションのためのゆらぎ値
      const flicker = (Math.floor(gameTime * 20) + i) % 3;
      
      // 外側の炎 (赤)
      ctx.fillStyle = "#ff5f6d";
      ctx.fillRect(-f.w / 2 - flicker, -f.h / 2, f.w + flicker, f.h);
      
      // 中側の炎 (オレンジ)
      ctx.fillStyle = "#ff8a80";
      ctx.fillRect(-f.w / 2 + 6, -f.h / 2 + 4, f.w - 10, f.h - 8);
      
      // 内側の芯 (黄色・白)
      ctx.fillStyle = "#ffe987";
      ctx.fillRect(-f.w / 2 + 14, -f.h / 2 + 8, f.w - 24, f.h - 16);
      
      // 炎の尾っぽ (ドット破片を後ろに配置)
      ctx.fillStyle = "#ff5f6d";
      ctx.fillRect(f.w / 2 + flicker, -4, 6, 6);
      ctx.fillRect(f.w / 2 + 6 - flicker, 2, 4, 4);

      ctx.restore();
    }
  }

  function drawWorld() {
    for (let i = 0; i < obstacles.length; i++) {
      const o = obstacles[i];
      const sx = o.x - cameraX;
      ctx.fillStyle = "#7a5c3e";
      ctx.fillRect(sx, groundY - o.h, o.w, o.h);
      ctx.strokeStyle = "#4a3625";
      ctx.strokeRect(sx, groundY - o.h, o.w, o.h);
    }

    for (let i = 0; i < coins.length; i++) {
      const c = coins[i];
      if (c.taken) continue;
      const sx = c.x - cameraX;
      ctx.fillStyle = "#ffd54a";
      ctx.beginPath();
      ctx.arc(sx, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#c49000";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    for (let i = 0; i < healItems.length; i++) {
      const h = healItems[i];
      if (h.taken) continue;
      const sx = h.x - cameraX;
      const sy = h.y;
      // ハート型をドット矩形で描画
      ctx.save();
      ctx.translate(sx, sy);
      // 外枠（濃いピンク）
      ctx.fillStyle = "#e05a5a";
      ctx.fillRect(-8, -10, 6, 5);
      ctx.fillRect(2, -10, 6, 5);
      ctx.fillRect(-10, -6, 20, 6);
      ctx.fillRect(-8, 0, 16, 5);
      ctx.fillRect(-5, 5, 10, 4);
      ctx.fillRect(-2, 8, 4, 3);
      // 内側（明るいピンク）
      ctx.fillStyle = "#ff8a80";
      ctx.fillRect(-6, -8, 4, 3);
      ctx.fillRect(2, -8, 4, 3);
      ctx.fillRect(-8, -4, 16, 4);
      ctx.fillRect(-6, 0, 12, 4);
      ctx.fillRect(-3, 4, 6, 3);
      // ハイライト（白）
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(-5, -7, 2, 2);
      ctx.fillRect(3, -7, 2, 2);
      ctx.restore();
    }

    // 銃アイテム描画
    for (let i = 0; i < gunItems.length; i++) {
      const g = gunItems[i];
      if (g.taken) continue;
      const sx = g.x - cameraX;
      const sy = g.y;
      ctx.save();
      ctx.translate(sx, sy);
      // アイテム枠（薄い青背景）
      ctx.fillStyle = "rgba(60,120,200,0.5)";
      ctx.fillRect(-16, -12, 32, 24);
      ctx.strokeStyle = "#5ad0ff";
      ctx.lineWidth = 2;
      ctx.strokeRect(-16, -12, 32, 24);
      // 銃本体（銃身）
      ctx.fillStyle = "#c8c8c8";
      ctx.fillRect(-10, -3, 18, 6);
      // 銃口
      ctx.fillStyle = "#e8e8e8";
      ctx.fillRect(8, -2, 6, 4);
      // グリップ
      ctx.fillStyle = "#a06040";
      ctx.fillRect(-8, 2, 8, 7);
      // トリガー
      ctx.fillStyle = "#888";
      ctx.fillRect(-2, 2, 2, 5);
      // ハイライト
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(-9, -2, 10, 2);
      ctx.restore();
    }

    // 銃弾描画
    for (let i = 0; i < playerBullets.length; i++) {
      const b = playerBullets[i];
      const sx = b.x - cameraX;
      ctx.fillStyle = "#ffe987";
      ctx.fillRect(sx, b.y - b.h / 2, b.w, b.h);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(sx, b.y - 1, 4, 2);
    }

    // バズーカアイテム描画
    for (let i = 0; i < bazookaItems.length; i++) {
      const g = bazookaItems[i];
      if (g.taken) continue;
      const sx = g.x - cameraX;
      const sy = g.y;
      ctx.save();
      ctx.translate(sx, sy);
      // アイテム枠（濃いオレンジ背景）
      ctx.fillStyle = "rgba(180,80,0,0.55)";
      ctx.fillRect(-18, -14, 36, 28);
      ctx.strokeStyle = "#ff9940";
      ctx.lineWidth = 2;
      ctx.strokeRect(-18, -14, 36, 28);
      // バズーカ本体（太い筒）
      ctx.fillStyle = "#888";
      ctx.fillRect(-14, -5, 22, 10);
      // 砲身（さらに太く前方へ）
      ctx.fillStyle = "#aaa";
      ctx.fillRect(-4, -7, 20, 14);
      // 砲口
      ctx.fillStyle = "#555";
      ctx.fillRect(14, -8, 5, 16);
      // グリップ
      ctx.fillStyle = "#6a3a1a";
      ctx.fillRect(-12, 3, 8, 9);
      // 肩当て（後端の丸み）
      ctx.fillStyle = "#666";
      ctx.fillRect(-16, -4, 5, 8);
      // ハイライト
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(-12, -6, 18, 3);
      ctx.restore();
    }

    // バズーカ弾描画
    for (let i = 0; i < bazookaBullets.length; i++) {
      const b = bazookaBullets[i];
      const sx = b.x - cameraX;
      // 弾本体（濃いオレンジ）
      ctx.fillStyle = "#ff6600";
      ctx.fillRect(sx, b.y - b.h / 2, b.w, b.h);
      // 弾頭（黄色）
      ctx.fillStyle = "#ffe987";
      ctx.fillRect(sx + b.w - 6, b.y - b.h / 2 + 2, 6, b.h - 4);
      // 尾（明るい炎）
      ctx.fillStyle = "#ff9940";
      ctx.fillRect(sx - 6, b.y - b.h / 2 + 3, 8, b.h - 6);
    }

    for (let i = 0; i < enemies.length; i++) drawEnemy(enemies[i]);
  }

  function drawHUD() {
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(12, 12, 220, 130);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 20px system-ui,sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("スコア " + Math.floor(score), 24, 38);
    ctx.font = "bold 20px system-ui,sans-serif";
    ctx.fillStyle = "#c8d0e0";
    ctx.fillText("時間 " + gameTime.toFixed(1) + "s", 24, 68);

    // HP ハート表示
    ctx.font = "bold 18px system-ui,sans-serif";
    ctx.textAlign = "left";
    for (let i = 0; i < MAX_HP; i++) {
      ctx.fillStyle = i < playerHP ? "#ff5f6d" : "rgba(255,255,255,0.2)";
      ctx.fillText("♥", 24 + i * 26, 100);
    }

    // 武器・弾数表示
    if (weapon === "gun") {
      ctx.fillStyle = "#5ad0ff";
      ctx.font = "bold 16px system-ui,sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("GUN  " + ammo + " / " + GUN_AMMO, 24, 122);
    } else if (weapon === "bazooka") {
      ctx.fillStyle = "#ff9940";
      ctx.font = "bold 16px system-ui,sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("BZK  " + ammo + " / " + BAZOOKA_AMMO, 24, 122);
    }

    if (state === STATE.PLAYING) {
      // --- 画面上部中央の現在ステージ表示 ---
      ctx.fillStyle = "rgba(13,20,36,0.65)";
      ctx.fillRect(canvas.width / 2 - 75, 12, 150, 42);
      ctx.lineWidth = 2;
      ctx.strokeStyle = "#f0c052";
      ctx.strokeRect(canvas.width / 2 - 75, 12, 150, 42);

      ctx.fillStyle = "#ffdf5b";
      ctx.font = "bold 20px system-ui,sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("STAGE " + currentStage, canvas.width / 2, 40);

      // --- 右上「ボス登場まで/ボス突破まで」表示と進捗バー ---
      if (stageTextType !== "CLEAR") {
        let titleText = "";
        let remaining = 0;
        let progress = 0;
        let barColor = "";
        let borderColor = "";
        let bgColor = "";
        let textColor = "";

        if (!isBossBattle) {
          const requiredBossScore = STAGE_BOSS_SCORE_BASE + (currentStage - 1) * STAGE_BOSS_SCORE_GROWTH;
          titleText = "ボス登場まで";
          remaining = Math.max(0, Math.ceil(requiredBossScore - (score - stageScoreStart)));
          progress = Math.min(1.0, Math.max(0.0, (score - stageScoreStart) / requiredBossScore));
          barColor = "#ffe987";    // ボス戦前は黄色系統のゲージ
          borderColor = "#f0c052"; // ゴールド枠
          bgColor = "rgba(13,20,36,0.75)";
          textColor = "#ffdf5b";
        } else {
          titleText = "ボス突破まで";
          const requiredPoints = BOSS_CLEAR_POINTS_BASE + (currentStage - 1) * BOSS_CLEAR_POINTS_GROWTH;
          remaining = Math.max(0, Math.ceil(requiredPoints - (score - bossScoreStart)));
          progress = Math.min(1.0, Math.max(0.0, (score - bossScoreStart) / requiredPoints));
          barColor = "#ff8a80";    // ボス戦中は赤系統のゲージ
          borderColor = "#ff5f6d"; // 警告赤枠
          bgColor = "rgba(18,18,32,0.75)";
          textColor = "#ffd1d1";
        }

        const hudX = canvas.width - 240 - 12;
        const hudY = 64;
        const hudW = 240;
        const hudH = 68;

        // パネル背景
        ctx.fillStyle = bgColor;
        ctx.fillRect(hudX, hudY, hudW, hudH);
        
        // パネル枠
        ctx.lineWidth = 2;
        ctx.strokeStyle = borderColor;
        ctx.strokeRect(hudX, hudY, hudW, hudH);

        // ラベルテキスト
        ctx.fillStyle = textColor;
        ctx.font = "bold 15px system-ui,sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(titleText, hudX + 16, hudY + 28);

        // 残り数値
        ctx.fillStyle = barColor;
        ctx.font = "bold 20px system-ui,sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(remaining, hudX + 224, hudY + 31);

        // プログレスバー
        const barX = hudX + 16;
        const barY = hudY + 45;
        const barW = hudW - 32;
        const barH = 8;

        // バー背景
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(barX, barY, barW, barH);

        // バーゲージ
        ctx.fillStyle = barColor;
        ctx.fillRect(barX, barY, barW * progress, barH);
      }

      // --- 中央の大文字演出テキスト表示 ---
      if (stageTextTimer > 0) {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        
        ctx.save();
        const alpha = Math.min(1.0, stageTextTimer * 1.5);
        ctx.fillStyle = "rgba(10, 14, 26, " + (0.35 * alpha) + ")";
        ctx.fillRect(0, cy - 60, canvas.width, 120);

        ctx.textAlign = "center";
        
        if (stageTextType === "INTRO") {
          ctx.font = "bold 52px system-ui,sans-serif";
          ctx.fillStyle = "rgba(0, 0, 0, " + (0.5 * alpha) + ")";
          ctx.fillText("STAGE " + currentStage, cx + 3, cy + 18 + 3);
          ctx.fillStyle = "rgba(255, 223, 91, " + alpha + ")";
          ctx.fillText("STAGE " + currentStage, cx, cy + 18);
        } else if (stageTextType === "CLEAR") {
          ctx.font = "bold 52px system-ui,sans-serif";
          ctx.fillStyle = "rgba(0, 0, 0, " + (0.5 * alpha) + ")";
          ctx.fillText("STAGE CLEAR", cx + 3, cy + 18 + 3);
          ctx.fillStyle = "rgba(126, 224, 131, " + alpha + ")";
          ctx.fillText("STAGE CLEAR", cx, cy + 18);
        }
        ctx.restore();
      }
    }

    if (state === STATE.TITLE) {
      ctx.fillStyle = "rgba(10,14,26,0.7)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const panelW = 560;
      const panelH = 210;
      const panelX = cx - panelW / 2;
      const panelY = cy - 128;

      ctx.fillStyle = "rgba(13,20,36,0.76)";
      ctx.fillRect(panelX, panelY, panelW, panelH);
      ctx.fillStyle = "#f0c052";
      ctx.fillRect(panelX - 5, panelY - 5, panelW + 10, 5);
      ctx.fillRect(panelX - 5, panelY + panelH, panelW + 10, 5);
      ctx.fillRect(panelX - 5, panelY, 5, panelH);
      ctx.fillRect(panelX + panelW, panelY, 5, panelH);
      ctx.fillStyle = "#7b4d2a";
      ctx.fillRect(panelX + 8, panelY + 8, panelW - 16, 3);
      ctx.fillRect(panelX + 8, panelY + panelH - 11, panelW - 16, 3);

      for (let i = 0; i < 9; i++) {
        const bx = panelX + 34 + i * 62;
        ctx.fillStyle = i % 2 ? "#335070" : "#263d5b";
        ctx.fillRect(bx, panelY + 24, 28, 4);
        ctx.fillRect(bx + 10, panelY + panelH - 30, 28, 4);
      }

      ctx.fillStyle = "#f6c84d";
      for (let i = 0; i < 3; i++) {
        const coinX = panelX + 72 + i * 210;
        const coinY = panelY + 48 + (i % 2) * 102;
        ctx.fillRect(coinX - 10, coinY - 10, 20, 20);
        ctx.fillStyle = "#ffe987";
        ctx.fillRect(coinX - 5, coinY - 7, 10, 14);
        ctx.fillStyle = "#c48a18";
        ctx.fillRect(coinX - 10, coinY + 7, 20, 3);
        ctx.fillStyle = "#f6c84d";
      }

      ctx.textAlign = "center";
      ctx.font = "bold 54px system-ui,sans-serif";
      ctx.fillStyle = "#162238";
      ctx.fillText("博士ランナー", cx + 4, cy - 62);
      ctx.fillStyle = "#ffdf5b";
      ctx.fillText("博士ランナー", cx, cy - 66);
      ctx.fillStyle = "#fff4b8";
      ctx.fillText("博士ランナー", cx, cy - 70);

      ctx.fillStyle = "#d6f2ff";
      ctx.font = "bold 18px system-ui,sans-serif";
      ctx.fillText("16BIT SCIENCE RUN", cx, cy - 30);

      ctx.save();
      ctx.translate(cx - 180, cy + 72);
      ctx.scale(0.9, 0.9);
      drawHakase(0, 0);
      ctx.restore();

      ctx.fillStyle = "#203047";

    } else if (state === STATE.GAMEOVER) {

      for (let i = 0; i < 8; i++) {

      ctx.fillRect(cx - 102, cy - 34, 204, 4);
      ctx.fillRect(cx - 102, cy + 0, 204, 4);
      ctx.fillStyle = "#f7f7ff";
      ctx.font = "bold 22px system-ui,sans-serif";
      ctx.fillText("最終スコア " + Math.floor(score), cx, cy - 10);

      ctx.save();
      ctx.translate(cx - 178, cy + 74);
      ctx.rotate(-0.12);
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.fillRect(-30, -5, 68, 6);
      ctx.fillStyle = "#0a0a0a";
      ctx.fillRect(-22, -13, 48, 10);
      ctx.fillStyle = "#f4efe4";
      ctx.fillRect(-26, -30, 42, 18);
      ctx.fillRect(-4, -34, 25, 10);
      ctx.fillStyle = "#2a2520";
      ctx.fillRect(-8, -28, 12, 16);
      ctx.fillStyle = "#f0d6ba";
      ctx.fillRect(-18, -46, 25, 18);
      ctx.fillRect(3, -39, 10, 7);
      ctx.fillStyle = "#d9d5cc";
      ctx.fillRect(-23, -51, 34, 8);
      ctx.fillRect(-9, -58, 14, 14);
      ctx.fillRect(4, -53, 11, 11);
      ctx.fillStyle = "#050505";
      ctx.fillRect(-15, -41, 13, 6);
      ctx.fillRect(-2, -39, 13, 4);
      ctx.fillStyle = "#f7f2e8";
      ctx.fillRect(1, -32, 11, 3);
      ctx.fillStyle = "#ffdf5b";
      ctx.fillRect(22, -58, 4, 4);
      ctx.fillRect(31, -48, 4, 4);
      ctx.restore();

      // 選択肢の表示
      ctx.textAlign = "left";
      ctx.font = "bold 20px system-ui,sans-serif";
      
      const opt1Y = cy + 48;
      const opt2Y = cy + 83;
      const optX = cx - 20;

      // 「もう一度走る」テキスト
      ctx.fillStyle = (gameOverSelectIndex === 0) ? "#ffffff" : "#8b92a5";
      ctx.fillText("もう一度走る", optX, opt1Y);

      // 「タイトルに戻る」テキスト
      ctx.fillStyle = (gameOverSelectIndex === 1) ? "#ffffff" : "#8b92a5";
      ctx.fillText("タイトルに戻る", optX, opt2Y);

      // カーソル ▶
      ctx.fillStyle = "#7ee083";
      if (gameOverSelectIndex === 0) {
        ctx.fillText("▶", optX - 25, opt1Y);
      } else {
        ctx.fillText("▶", optX - 25, opt2Y);
      }

      ctx.fillStyle = "#b44a4a";
      ctx.fillRect(panelX + panelW - 82, panelY + 124, 44, 10);
      ctx.fillRect(panelX + panelW - 64, panelY + 94, 10, 40);
      ctx.fillStyle = "#6f2d2d";
      ctx.fillRect(panelX + panelW - 74, panelY + 104, 28, 8);
      return;

      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ff8a80";
      ctx.font = "bold 32px system-ui,sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("ゲームオーバー", canvas.width / 2, canvas.height / 2 - 20);
      ctx.fillStyle = "#fff";
      ctx.font = "18px system-ui,sans-serif";
      ctx.fillText("スコア " + Math.floor(score), canvas.width / 2, canvas.height / 2 + 20);
      ctx.fillText("Enter または タップでリトライ", canvas.width / 2, canvas.height / 2 + 52);
    }
  }

  function render() {
    drawParallax();
    drawGround();
    drawWorld();
    const bottom = groundY - player.alt;
    drawHakase(PLAYER_SCREEN_X, bottom);
    if (state === STATE.PLAYING) {
      if (isBossBattle) {
        const elapsed = gameTime - bossTimeStart;
        const slideInProgress = Math.min(1.0, elapsed / 1.5); // 1.5秒かけてスライドイン
        const currentX = (canvas.width + 100) - ((canvas.width + 100) - BOSS_SCREEN_X) * slideInProgress;
        drawBoss(currentX, groundY - bossAlt);
      } else if (bossExplosionTimer > 0) {
        drawBossExplosion();
      }
      drawBossProjectiles();
    }
    drawHUD();
  }

  function loop(now) {
    const dt = Math.min(0.05, (now - lastFrame) / 1000 || 0);
    lastFrame = now;
    if (state === STATE.PLAYING) update(dt);
    render();
    requestAnimationFrame(loop);
  }

  lastFrame = performance.now();
  requestAnimationFrame(loop);
})();
  </script>
</body>
</html>
